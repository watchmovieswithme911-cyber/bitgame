version: '3.8'

services:
  # Main Web Server
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SELLER_WALLET=${SELLER_WALLET}
      - COMMISSION_RATE=${COMMISSION_RATE:-0.05}
      - BTCPAY_URL=${BTCPAY_URL}
      - BTCPAY_API_KEY=${BTCPAY_API_KEY}
      - BTCPAY_STORE_ID=${BTCPAY_STORE_ID}
      - APP_URL=${APP_URL:-http://localhost:8080}
    volumes:
      - ./data/db:/app/data
    depends_on:
      - agent
    restart: unless-stopped

  # 24/7 AI Agent Worker
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      - SELLER_WALLET=${SELLER_WALLET}
      - COMMISSION_RATE=${COMMISSION_RATE:-0.05}
      - BTCPAY_URL=${BTCPAY_URL}
      - BTCPAY_API_KEY=${BTCPAY_API_KEY}
      - BTCPAY_STORE_ID=${BTCPAY_STORE_ID}
    volumes:
      - ./data/db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db:
    driver: local
